name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  check:
    name: Lint + Types + Dead Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun test tests/unit

  integration-tests:
    name: Integration Tests (Postgres 18 + SCRAM + TLS)
    runs-on: ubuntu-latest
    # Uses the project's docker-compose instead of a `services.postgres` block
    # because the TLS integration tests require `ssl=on` plus a self-signed
    # cert provisioned at container startup — the service-container syntax
    # can't run an entrypoint. Keeping CI symmetric with `bun run db:up`.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run db:up
      - run: bun test tests/integration
        env:
          TEST_DATABASE_URL: "postgres://bun_pg_listen:test_password@localhost:54329/bun_pg_listen_test"
      - name: Dump Postgres logs on failure
        if: failure()
        run: docker compose -f tests/docker-compose.yml logs
      - if: always()
        run: bun run db:down
